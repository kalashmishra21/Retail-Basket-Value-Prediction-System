services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: retail_basket_db
    environment:
      POSTGRES_DB: retail_basket_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: retail_basket_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 300 --limit-request-line 8190 --limit-request-field_size 8190 --max-requests 1000 --max-requests-jitter 50"
    env_file:
      - ./backend/.env.docker
    environment:
      - USE_POSTGRES=True
      - DB_HOST=db
      - DB_NAME=retail_basket_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres123
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume:
  media_volume:
